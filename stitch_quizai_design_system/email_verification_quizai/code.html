<style>

<body class="bg-background text-on-surface min-h-screen flex items-center justify-center relative overflow-hidden font-body-md antialiased selection:bg-primary/30 selection:text-primary-fixed">
<!-- Ambient Glow Background -->
<div class="ambient-glow"></div>
<!-- Main Container -->
<main class="w-full max-w-[480px] px-margin-mobile md:px-0 relative z-10">
<!-- Verification Card -->
<div class="bg-surface-container-low border border-outline-variant/30 rounded-xl p-gutter md:p-stack-lg shadow-lg backdrop-blur-xl">
<!-- Icon/Illustration Area -->
<div class="flex justify-center mb-stack-md relative">
<div class="w-20 h-20 bg-primary-container/10 rounded-full flex items-center justify-center border border-primary/20 relative">
<!-- Subtle pulsing glow behind icon -->
<div class="absolute inset-0 bg-primary/5 rounded-full animate-pulse blur-md"></div>
<span class="material-symbols-outlined text-[40px] text-primary" style="font-variation-settings: 'FILL' 1;">
                        mark_email_unread
                    </span>
</div>
</div>
<!-- Header & Context -->
<div class="text-center mb-stack-lg">
<h1 class="font-headline-lg-mobile md:font-headline-lg text-headline-lg-mobile md:text-headline-lg text-on-surface mb-stack-sm">
                    Verify your email
                </h1>
<p class="font-body-md text-body-md text-on-surface-variant max-w-[320px] mx-auto">
                    We've sent a 6-digit code to your email. Please enter it below to verify your account.
                </p>
</div>
<!-- OTP Form -->
<form class="space-y-stack-lg" id="otp-form">
<!-- OTP Inputs Grid -->
<div class="flex justify-between items-center gap-2" id="otp-container">
<input aria-label="Digit 1" autocomplete="one-time-code" class="otp-input w-12 h-14 md:w-14 md:h-16 text-center bg-surface-container-highest border border-outline-variant rounded-lg font-headline-md text-headline-md text-on-surface transition-all duration-200" inputmode="numeric" maxlength="1" pattern="[0-9]*" required="" type="text">
<input aria-label="Digit 2" class="otp-input w-12 h-14 md:w-14 md:h-16 text-center bg-surface-container-highest border border-outline-variant rounded-lg font-headline-md text-headline-md text-on-surface transition-all duration-200" inputmode="numeric" maxlength="1" pattern="[0-9]*" required="" type="text">
<input aria-label="Digit 3" class="otp-input w-12 h-14 md:w-14 md:h-16 text-center bg-surface-container-highest border border-outline-variant rounded-lg font-headline-md text-headline-md text-on-surface transition-all duration-200" inputmode="numeric" maxlength="1" pattern="[0-9]*" required="" type="text">
<input aria-label="Digit 4" class="otp-input w-12 h-14 md:w-14 md:h-16 text-center bg-surface-container-highest border border-outline-variant rounded-lg font-headline-md text-headline-md text-on-surface transition-all duration-200" inputmode="numeric" maxlength="1" pattern="[0-9]*" required="" type="text">
<input aria-label="Digit 5" class="otp-input w-12 h-14 md:w-14 md:h-16 text-center bg-surface-container-highest border border-outline-variant rounded-lg font-headline-md text-headline-md text-on-surface transition-all duration-200" inputmode="numeric" maxlength="1" pattern="[0-9]*" required="" type="text">
<input aria-label="Digit 6" class="otp-input w-12 h-14 md:w-14 md:h-16 text-center bg-surface-container-highest border border-outline-variant rounded-lg font-headline-md text-headline-md text-on-surface transition-all duration-200" inputmode="numeric" maxlength="1" pattern="[0-9]*" required="" type="text">
</div>
<!-- Primary Action -->
<button class="w-full bg-primary-container hover:bg-primary-container/90 text-white font-label-md text-label-md py-4 rounded-lg transition-all duration-200 flex items-center justify-center gap-2 group shadow-md shadow-primary-container/20" id="verify-btn" type="submit">
                    Verify &amp; Continue
                    <span class="material-symbols-outlined text-[20px] transition-transform duration-200 group-hover:translate-x-1">
                        arrow_forward
                    </span>
</button>
</form>
<!-- Resend Logic -->
<div class="mt-stack-md text-center font-label-md text-label-md">
<span class="text-on-surface-variant">Didn't receive the code?</span>
<button class="text-primary hover:text-primary-fixed ml-1 transition-colors disabled:opacity-50 disabled:cursor-not-allowed" disabled="" id="resend-btn">
                    Resend <span id="countdown">(0:59)</span>
</button>
</div>
</div>
<!-- Minimal Footer/Brand Anchor -->
<div class="mt-stack-lg text-center">
<span class="font-label-md text-label-md font-bold text-primary opacity-80">QuizAI</span>
</div>

<script>
        document.addEventListener('DOMContentLoaded', () => {
            const inputs = document.querySelectorAll('.otp-input');
            const resendBtn = document.getElementById('resend-btn');
            const countdownSpan = document.getElementById('countdown');
            const form = document.getElementById('otp-form');
            const verifyBtn = document.getElementById('verify-btn');

            // --- OTP Input Logic ---
            inputs.forEach((input, index) => {
                // Focus first input on load
                if(index === 0) input.focus();

                input.addEventListener('input', (e) => {
                    const val = e.target.value;
                    
                    // Ensure only numbers
                    if (!/^\d*$/.test(val)) {
                        e.target.value = '';
                        return;
                    }

                    // Move to next input if a digit is entered
                    if (val.length === 1 && index < inputs.length - 1) {
                        inputs[index + 1].focus();
                    }
                    
                    checkAllFilled();
                });

                input.addEventListener('keydown', (e) => {
                    // Move to previous on Backspace if empty
                    if (e.key === 'Backspace' && e.target.value === '' && index > 0) {
                        inputs[index - 1].focus();
                        inputs[index - 1].value = ''; // Optional: clear previous on backspace
                        checkAllFilled();
                    }
                });

                // Handle paste (e.g. from SMS)
                input.addEventListener('paste', (e) => {
                    e.preventDefault();
                    const pastedData = (e.clipboardData || window.clipboardData).getData('text');
                    const numbersOnly = pastedData.replace(/\D/g, '').substring(0, 6);
                    
                    if(numbersOnly.length > 0) {
                        for(let i = 0; i < numbersOnly.length; i++) {
                            if(inputs[i]) {
                                inputs[i].value = numbersOnly[i];
                            }
                        }
                        // Focus next empty or last
                        const nextIndex = Math.min(numbersOnly.length, inputs.length - 1);
                        inputs[nextIndex].focus();
                        checkAllFilled();
                    }
                });
            });

            function checkAllFilled() {
                const allFilled = Array.from(inputs).every(input => input.value.length === 1);
                // Optional: add a visual state to button when ready
                if(allFilled) {
                    verifyBtn.classList.add('shadow-[0_0_15px_rgba(79,70,229,0.4)]');
                } else {
                    verifyBtn.classList.remove('shadow-[0_0_15px_rgba(79,70,229,0.4)]');
                }
            }

            // --- Countdown Logic ---
            let timeLeft = 59;
            let timerId;

            function startTimer() {
                resendBtn.disabled = true;
                resendBtn.classList.add('opacity-50', 'cursor-not-allowed');
                
                timerId = setInterval(() => {
                    timeLeft--;
                    const seconds = timeLeft < 10 ? `0${timeLeft}` : timeLeft;
                    countdownSpan.textContent = `(0:${seconds})`;

                    if (timeLeft <= 0) {
                        clearInterval(timerId);
                        resendBtn.disabled = false;
                        resendBtn.classList.remove('opacity-50', 'cursor-not-allowed');
                        countdownSpan.textContent = '';
                    }
                }, 1000);
            }

            startTimer();

            resendBtn.addEventListener('click', (e) => {
                e.preventDefault();
                if (!resendBtn.disabled) {
                    // Reset timer
                    timeLeft = 59;
                    countdownSpan.textContent = `(0:59)`;
                    startTimer();
                    // Simulate resend action visual feedback
                    inputs.forEach(i => i.value = '');
                    inputs[0].focus();
                    checkAllFilled();
                }
            });

            // --- Form Submit ---
            form.addEventListener('submit', (e) => {
                e.preventDefault();
                
                const code = Array.from(inputs).map(i => i.value).join('');
                if(code.length === 6) {
                    // Simulate loading state
                    const originalText = verifyBtn.innerHTML;
                    verifyBtn.innerHTML = `<span class="material-symbols-outlined animate-spin text-[20px]">progress_activity</span> Verifying...`;
                    verifyBtn.disabled = true;
                    verifyBtn.classList.add('opacity-80');
                    
                    setTimeout(() => {
                        // Reset for demo purposes
                        verifyBtn.innerHTML = originalText;
                        verifyBtn.disabled = false;
                        verifyBtn.classList.remove('opacity-80');
                        alert(`Verification code submitted: ${code}`);
                    }, 1500);
                }
            });
        });
    </script>
</body></html>
