<body class="bg-background text-on-surface min-h-screen flex flex-col font-body-md">
<!-- Main Content Canvas -->
<main class="flex-grow flex items-center justify-center p-margin-mobile md:p-margin-desktop relative overflow-hidden">
<!-- Ambient Background glow -->
<div class="absolute top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 w-[600px] h-[600px] bg-primary-container/10 rounded-full blur-[100px] pointer-events-none"></div>
<div class="w-full max-w-md bg-surface-container-low border border-outline-variant/30 rounded-xl p-8 shadow-2xl relative z-10 flex flex-col gap-stack-lg">
<!-- Brand & Heading -->
<div class="flex flex-col items-center text-center gap-stack-sm">
<div class="w-12 h-12 bg-surface-container-high rounded-full flex items-center justify-center mb-2 shadow-sm border border-outline-variant/20">
<span class="material-symbols-outlined text-primary-container text-2xl" data-icon="lock_reset" data-weight="fill" style="font-variation-settings: 'FILL' 1;">lock_reset</span>
</div>
<h1 class="font-headline-md text-headline-md text-on-surface">Forgot your password?</h1>
<p class="font-body-md text-body-md text-on-surface-variant">
                    Enter your email address and we'll send you a link to reset your password.
                </p>
</div>
<!-- Form -->
<form class="flex flex-col gap-stack-md" onsubmit="event.preventDefault();">
<div class="flex flex-col gap-1">
<label class="font-label-md text-label-md text-on-surface-variant ml-1" for="email">Email address</label>
<div class="relative">
<span class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none text-outline">
<span class="material-symbols-outlined text-[20px]" data-icon="mail">mail</span>
</span>
<input class="w-full pl-10 pr-4 py-3 bg-surface-container-highest border border-outline-variant rounded-lg text-on-surface placeholder:text-outline focus:border-primary-container focus:ring-0 input-glow transition-all duration-200 font-body-md text-body-md" id="email" name="email" placeholder="name@company.com" required="" type="email">
</div>
</div>
<button class="w-full bg-primary-container hover:bg-[#635BFF] text-white py-3 px-4 rounded-lg font-label-md text-label-md transition-all duration-200 shadow-sm mt-2 flex items-center justify-center gap-2 group" type="submit">
<span>Send Reset Link</span>
<span class="material-symbols-outlined text-[18px] group-hover:translate-x-1 transition-transform" data-icon="arrow_forward">arrow_forward</span>
</button>
</form>
<!-- Back to Login Link -->
<div class="text-center pt-2 border-t border-outline-variant/30">
<a class="inline-flex items-center gap-1 font-label-md text-label-md text-primary hover:text-primary-container transition-colors group" href="#">
<span class="material-symbols-outlined text-[16px] group-hover:-translate-x-1 transition-transform" data-icon="arrow_back">arrow_back</span>
<span>Back to Login</span>
</a>
</div>
</div>
</main>
