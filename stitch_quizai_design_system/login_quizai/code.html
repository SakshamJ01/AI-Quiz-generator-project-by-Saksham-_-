<style>
        /* Custom styles for glowing inputs */
        .input-glow:focus {
            box-shadow: 0 0 0 4px rgba(79, 70, 229, 0.15); /* Primary Indigo glow */
            border-color: #4f46e5;
        }
        
        /* Subtle ambient shadow for the card */
        .ambient-shadow {
            box-shadow: 0 20px 40px -10px rgba(0, 0, 0, 0.6);
        }
    </style>
</head>
<body class="bg-background text-on-background min-h-screen flex items-center justify-center p-margin-mobile md:p-margin-desktop font-body-md relative overflow-hidden">
<!-- Background Decor -->
<div class="absolute inset-0 pointer-events-none overflow-hidden z-0">
<div class="absolute top-[-10%] left-[-10%] w-[40%] h-[40%] bg-primary-container rounded-full blur-[120px] opacity-10"></div>
<div class="absolute bottom-[-10%] right-[-10%] w-[50%] h-[50%] bg-secondary-container rounded-full blur-[150px] opacity-10"></div>
</div>
<!-- Main Auth Container -->
<main class="w-full max-w-md bg-surface-container-high rounded-xl border border-surface-variant ambient-shadow z-10 relative overflow-hidden flex flex-col p-6 sm:p-8">
<!-- Header -->
<header class="text-center mb-stack-lg">
<h1 class="text-headline-md font-headline-md font-bold text-primary-container dark:text-primary mb-stack-sm tracking-tight">QuizAI</h1>
<p class="text-body-md font-body-md text-on-surface-variant">Welcome back. Let's get to work.</p>
</header>
<!-- Login Form -->
<form action="#" class="flex flex-col gap-stack-md" method="POST">
<!-- Email Input -->
<div class="flex flex-col gap-stack-sm">
<label class="text-label-sm font-label-sm text-on-surface uppercase tracking-wider" for="email">Email Address</label>
<div class="relative">
<span class="material-symbols-outlined absolute left-3 top-1/2 -translate-y-1/2 text-on-surface-variant pointer-events-none" style="font-variation-settings: 'FILL' 0;">mail</span>
<input class="w-full bg-surface-container-low text-on-surface border border-surface-variant rounded-lg py-2 pl-10 pr-3 focus:outline-none input-glow transition-all duration-200 placeholder:text-outline-variant text-body-md font-body-md" id="email" name="email" placeholder="name@company.com" required="" type="email">
</div>
</div>
<!-- Password Input -->
<div class="flex flex-col gap-stack-sm">
<div class="flex justify-between items-center">
<label class="text-label-sm font-label-sm text-on-surface uppercase tracking-wider" for="password">Password</label>
<a class="text-label-sm font-label-sm text-primary hover:text-primary-container transition-colors" href="#">Forgot password?</a>
</div>
<div class="relative">
<span class="material-symbols-outlined absolute left-3 top-1/2 -translate-y-1/2 text-on-surface-variant pointer-events-none" style="font-variation-settings: 'FILL' 0;">lock</span>
<input class="w-full bg-surface-container-low text-on-surface border border-surface-variant rounded-lg py-2 pl-10 pr-10 focus:outline-none input-glow transition-all duration-200 placeholder:text-outline-variant text-body-md font-body-md" id="password" name="password" placeholder="••••••••" required="" type="password">
<button class="absolute right-3 top-1/2 -translate-y-1/2 text-on-surface-variant hover:text-on-surface transition-colors focus:outline-none" type="button">
<span class="material-symbols-outlined" style="font-variation-settings: 'FILL' 0;">visibility_off</span>
</button>
</div>
</div>
<!-- Remember Me -->
<div class="flex items-center mt-2 mb-2">
<input class="h-4 w-4 rounded border-surface-variant bg-surface-container-low text-primary-container focus:ring-primary-container focus:ring-offset-surface-container-high transition-colors" id="remember-me" name="remember-me" type="checkbox">
<label class="ml-2 block text-label-md font-label-md text-on-surface-variant" for="remember-me">
                    Remember me for 30 days
                </label>
</div>
<!-- Submit Button -->
<button class="w-full bg-primary-container hover:bg-inverse-primary text-white text-label-md font-label-md font-medium rounded-lg py-3 px-4 shadow-sm transition-all duration-200 hover:shadow-md active:scale-[0.98] flex justify-center items-center gap-2" type="submit">
                Log In
                <span class="material-symbols-outlined" style="font-variation-settings: 'FILL' 0;">arrow_forward</span>
</button>
</form>
<!-- Divider -->
<div class="relative my-stack-lg flex items-center">
<div class="flex-grow border-t border-surface-variant"></div>
<span class="flex-shrink-0 mx-4 text-label-sm font-label-sm text-on-surface-variant uppercase tracking-wider">Or continue with</span>
<div class="flex-grow border-t border-surface-variant"></div>
</div>
<!-- Social Logins -->
<div class="grid grid-cols-2 gap-4 mb-stack-lg">
<button class="flex items-center justify-center gap-2 py-2 px-4 border border-surface-variant rounded-lg bg-surface-container-low hover:bg-surface-variant text-on-surface text-label-md font-label-md transition-colors">
<svg class="w-5 h-5" fill="currentColor" viewBox="0 0 24 24">
<path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"></path>
<path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"></path>
<path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z" fill="#FBBC05"></path>
<path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"></path>
</svg>
                Google
            </button>
<button class="flex items-center justify-center gap-2 py-2 px-4 border border-surface-variant rounded-lg bg-surface-container-low hover:bg-surface-variant text-on-surface text-label-md font-label-md transition-colors">
<svg class="w-5 h-5" fill="currentColor" viewBox="0 0 24 24">
<path d="M12 0c-6.626 0-12 5.373-12 12 0 5.302 3.438 9.8 8.207 11.387.599.111.793-.261.793-.577v-2.234c-3.338.726-4.033-1.416-4.033-1.416-.546-1.387-1.333-1.756-1.333-1.756-1.089-.745.083-.729.083-.729 1.205.084 1.839 1.237 1.839 1.237 1.07 1.834 2.807 1.304 3.492.997.107-.775.418-1.305.762-1.604-2.665-.305-5.467-1.334-5.467-5.931 0-1.311.469-2.381 1.236-3.221-.124-.303-.535-1.524.117-3.176 0 0 1.008-.322 3.301 1.23.957-.266 1.983-.399 3.003-.404 1.02.005 2.047.138 3.006.404 2.291-1.552 3.297-1.23 3.297-1.23.653 1.653.242 2.874.118 3.176.77.84 1.235 1.911 1.235 3.221 0 4.609-2.807 5.624-5.479 5.921.43.372.823 1.102.823 2.222v3.293c0 .319.192.694.801.576 4.765-1.589 8.199-6.086 8.199-11.386 0-6.627-5.373-12-12-12z" fill="currentColor"></path>
</svg>
                GitHub
            </button>
</div>
<!-- Footer -->
<footer class="text-center mt-auto border-t border-surface-variant pt-stack-sm">
<p class="text-label-md font-label-md text-on-surface-variant mt-2">
                Don't have an account? 
                <a class="text-primary hover:text-primary-container font-medium transition-colors" href="#">Sign up</a>
</p>
</footer>
</main>
</body></html>
