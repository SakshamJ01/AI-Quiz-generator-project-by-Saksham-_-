<span class="material-symbols-outlined text-[20px]" data-icon="description">description</span>

<button class="flex-1 min-w-[120px] py-4 text-label-md font-label-md text-on-surface-variant hover:text-on-surface hover:bg-surface-container-high transition-colors flex items-center justify-center gap-2 whitespace-nowrap">
<span class="material-symbols-outlined text-[20px]" data-icon="link">link</span>

</div>

<div class="flex gap-3">
<label class="flex-1 cursor-pointer">
<input class="peer sr-only" name="difficulty" type="radio">
<div class="text-center py-2 px-3 rounded-md border border-surface-bright bg-surface-container peer-checked:border-primary peer-checked:bg-primary-container/10 peer-checked:text-primary text-on-surface-variant transition-all hover:bg-surface-container-high">
<span class="text-label-md font-label-md block">Easy</span>
</div>
</label>
<label class="flex-1 cursor-pointer">
<input checked="" class="peer sr-only" name="difficulty" type="radio">
<div class="text-center py-2 px-3 rounded-md border border-primary bg-primary-container/10 text-primary transition-all hover:bg-surface-container-high">
<span class="text-label-md font-label-md block">Medium</span>
</div>
</label>
<label class="flex-1 cursor-pointer">
<input class="peer sr-only" name="difficulty" type="radio">
<div class="text-center py-2 px-3 rounded-md border border-surface-bright bg-surface-container peer-checked:border-primary peer-checked:bg-primary-container/10 peer-checked:text-primary text-on-surface-variant transition-all hover:bg-surface-container-high">
<span class="text-label-md font-label-md block">Hard</span>
</div>
</label>
</div>
</div>

<label class="block text-label-sm font-label-sm text-on-surface-variant uppercase tracking-wider">AI Persona Tone</label>
<div class="relative">
<select class="w-full bg-surface-container border border-surface-bright rounded-md px-4 py-3 text-body-md font-body-md text-on-surface focus:outline-none focus:border-primary-container transition-colors appearance-none cursor-pointer">

<option>Academic</option>
<option>Casual</option>
</select>
<span class="material-symbols-outlined absolute right-4 top-1/2 -translate-y-1/2 text-outline pointer-events-none" data-icon="expand_more">expand_more</span>
</div>
</div>
</div>
</div>
</div>

<div class="bg-surface p-6 border-t border-surface-bright flex justify-end">
<button class="bg-primary-container hover:bg-inverse-primary text-white text-body-md font-body-md font-semibold px-8 py-4 rounded-lg transition-all flex items-center justify-center gap-3 w-full md:w-auto btn-glow">
<span class="material-symbols-outlined" data-icon="auto_awesome">auto_awesome</span>
                            Generate Quiz

</div>

<div class="text-center space-y-2 opacity-60 hover:opacity-100 transition-opacity">
<p class="text-label-sm font-label-sm text-on-surface-variant flex items-center justify-center gap-1">
<span class="material-symbols-outlined text-[14px]" data-icon="info">info</span>
                        Generation usually takes 5-10 seconds.
                    </p>
</div>
